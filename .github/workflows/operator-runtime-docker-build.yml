# Aurora — operator runtime Docker BUILD-ONLY validation (Implementation 043-H1 / Spec 043H Option C).
#
# What this proves: the repository's Dockerfile keeps building. This workflow publishes nothing, orchestrates
# nothing beyond the build step, authenticates to no cloud account, never runs the built image, and never runs
# an operator session. CI image build success is not production rollout, not runtime correctness, and not
# recommendation quality. See Spec 043H (docs/specs/) and the 043-H1 implementation report for the boundary.

name: Operator Runtime Docker Build

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: node --test

      - name: Build Docker image (build validation only — no push, no run)
        run: docker build --file Dockerfile .
